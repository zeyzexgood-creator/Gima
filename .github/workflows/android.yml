name: Debug Build

on:
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew
      
    - name: Clean build
      run: ./gradlew clean
      
    - name: Build with stacktrace (lihat error detail)
      run: ./gradlew :app:assembleDefaultRelease --stacktrace
      
    - name: List output files
      if: always()
      run: |
        echo "=== Build outputs ==="
        find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
        echo "=== Directory structure ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
        
    - name: Upload APK - Default Release
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AIDE-Plus-Default-Release.apk
        path: |
          app/build/outputs/apk/default/release/*.apk
          app/build/outputs/apk/*/release/*.apk
          app/build/outputs/apk/**/*.apk
        if-no-files-found: warn
        
    - name: Upload APK - Termux Release
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AIDE-Plus-Termux-Release.apk
        path: |
          app/build/outputs/apk/termux/release/*.apk
        if-no-files-found: warn
        
    - name: Upload all APKs (fallback)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: All-APKs
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: warn
