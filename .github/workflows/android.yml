name: Build & Publish Release APK

on:
  push:
    tags:
      - v*
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Clean build
      run: ./gradlew clean
      
    - name: Build with Gradle (Default Release)
      run: ./gradlew :app:assembleDefaultRelease
      
    - name: Build with Gradle (Termux Release)
      run: ./gradlew :app:assembleTermuxRelease
    
    # 获取版本 dari file gradle
    - name: Get version info
      id: get_version_info
      run: |
        cd app
        VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' build.gradle.kts | head -1)
        VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' build.gradle.kts | head -1)
        echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
        echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
        RELEASE_NAME="v${VERSION_NAME}-${VERSION_CODE}"
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
        ASSET_NAME_DEFAULT="AIDE-Plus_${VERSION_NAME}.apk"
        ASSET_NAME_TERMUX="AIDE-Plus_Termux_${VERSION_NAME}.apk"
        echo "ASSET_NAME_DEFAULT=${ASSET_NAME_DEFAULT}" >> $GITHUB_ENV
        echo "ASSET_NAME_TERMUX=${ASSET_NAME_TERMUX}" >> $GITHUB_ENV

    # 重命名 APK - Default Flavor
    - name: Rename Default APK
      run: |
        if [ -f "app/build/outputs/apk/default/release/app-default-release.apk" ]; then
          mv app/build/outputs/apk/default/release/app-default-release.apk app/build/outputs/apk/default/release/${{ env.ASSET_NAME_DEFAULT }}
          echo "Default APK found and renamed"
        else
          echo "Default APK not found"
          ls -la app/build/outputs/apk/default/release/ || true
        fi
        
    # 重命名 APK - Termux Flavor
    - name: Rename Termux APK
      run: |
        if [ -f "app/build/outputs/apk/termux/release/app-termux-release.apk" ]; then
          mv app/build/outputs/apk/termux/release/app-termux-release.apk app/build/outputs/apk/termux/release/${{ env.ASSET_NAME_TERMUX }}
          echo "Termux APK found and renamed"
        else
          echo "Termux APK not found"
          ls -la app/build/outputs/apk/termux/release/ || true
        fi
        
    # Upload Default APK
    - name: Upload Default APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ASSET_NAME_DEFAULT }}
        path: app/build/outputs/apk/default/release/${{ env.ASSET_NAME_DEFAULT }}
        
    # Upload Termux APK
    - name: Upload Termux APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ASSET_NAME_TERMUX }}
        path: app/build/outputs/apk/termux/release/${{ env.ASSET_NAME_TERMUX }}
        
    # 发布 ke GitHub Release (Default)
    - name: Upload Default APK to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ env.RELEASE_NAME }}
        files: app/build/outputs/apk/default/release/${{ env.ASSET_NAME_DEFAULT }}
        token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
        
    # 发布 ke GitHub Release (Termux)
    - name: Upload Termux APK to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ env.RELEASE_NAME }}
        files: app/build/outputs/apk/termux/release/${{ env.ASSET_NAME_TERMUX }}
        token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
